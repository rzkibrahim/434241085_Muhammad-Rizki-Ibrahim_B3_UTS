name: uts_mobile
description: "E-Ticketing Helpdesk Mobile App - UTS Praktikum Mobile Apps."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  fl_chart: ^0.67.0
  timeago: ^3.6.1
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
